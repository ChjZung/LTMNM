<!DOCTYPE html>
<html>

<body>
    <!--
        Bài: Hiển thị danh sách sản phẩm từ file JSON
        Mô tả: Trang này tải `product.json` bằng fetch, rồi dựng một bảng HTML
        với các cột Tên và Giá.
        Lưu ý: `product.json` phải ở cùng thư mục với file này.
    -->
    <table border="1" id="tbl"></table>
    <script>
        // Lấy dữ liệu sản phẩm từ product.json
        fetch('product.json')
            .then(res => res.json())
            .then(data => {
                // Xây dựng hàng tiêu đề
                let html = "<tr><th>Ten</th><th>Gia</th></tr>";
                // Thêm từng sản phẩm vào bảng
                data.forEach(p => {
                    html += `<tr><td>${p.name}</td><td>${p.price}</td></tr>`;
                });
                document.getElementById("tbl").innerHTML = html;
            })
            // Bắt lỗi khi không thể load file JSON
            .catch(err => {
                document.getElementById("tbl").innerHTML = '<tr><td colspan="2">Không thể tải danh sách sản phẩm</td></tr>';
                console.error('Lỗi khi gọi product.json:', err);
            });
    </script>
</body>

</html>
